openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: media
    description: Telegram media operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /media:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get all media from Telegram
      description: Fetches photos, videos, and documents from the configured Telegram group
      responses:
        "200":
          description: List of media items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "500":
          description: Server error (e.g. Telegram API failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MediaItem:
      type: object
      properties:
        type:
          type: string
          enum: [image, video, document]
        url:
          type: string
        file_name:
          type: string
        date:
          type: string
      required:
        - type
        - url
        - file_name
        - date
    MediaListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
        count:
          type: integer
      required:
        - items
        - count
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
